<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Blue background -->
  <rect width="512" height="512" fill="#E3F2FD" rx="110"/>
  
  <!-- Outer blue circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#2196F3" stroke-width="8"/>
  
  <!-- Shield outline -->
  <path d="M 256 100 L 150 160 L 150 250 Q 150 330 256 385 Q 362 330 362 250 L 362 160 Z" 
        fill="none" stroke="#2196F3" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Heart inside shield -->
  <path d="M 256 180 C 256 180, 220 220, 220 255 C 220 285, 235 305, 256 305 C 277 305, 292 285, 292 255 C 292 220, 256 180, 256 180" 
        fill="#F44336"/>
  
  <!-- Wave at bottom for disaster/relief theme -->
