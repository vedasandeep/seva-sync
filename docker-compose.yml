version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: sevasync-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sevasync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sevasync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sevasync-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sevasync?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: development
      ACCESS_TOKEN_SECRET: dev-access-token-secret-change-in-production
      REFRESH_TOKEN_SECRET: dev-refresh-token-secret-change-in-production
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

volumes:
  postgres_data:
  redis_data:
